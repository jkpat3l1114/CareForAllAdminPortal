<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CareForAll — Admin Backend Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.30.0/iconfont/tabler-icons.min.css" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="wordmark"><span class="dot"></span>CareForAll</div>
    <div class="admin-badge">
      <div class="avatar">JP</div>
      <div><div class="nm">Jay Patel</div><div class="rl" id="sbRole">Super Admin</div></div>
    </div>
    <nav class="nav" id="nav"></nav>
    <button class="signout" data-act="signout"><i class="ti ti-logout"></i> Sign Out</button>
  </aside>
  <div class="content-col">
    <header class="topbar" id="topbar"></header>
    <main class="main" id="main"></main>
  </div>
</div>

<div class="scrim" id="scrim" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer"></div>
<div class="modal" id="modal" onclick="if(event.target===this)closeModal()"><div class="box" id="modalBox"></div></div>
<div class="toast" id="toast"><i class="ti ti-check"></i><span id="toastMsg"></span></div>
<script src="app.js"></script>
</body>
</html>
